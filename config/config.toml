# Global LLM configuration
[llm]
api_type = "openai"                          # DeepSeek 使用 OpenAI 兼容 API
model = "deepseek-v4-pro"                    # DeepSeek-V4-Pro 模型名称
# 可选模型：deepseek-v4-pro（思考/非思考可切换）, deepseek-v4-flash
base_url = "https://api.deepseek.com"
# 如果未设置，将从环境变量 DASHSCOPE_API_KEY 读取（或运行 GUI 时在输入框中填写）
api_key = ""
max_tokens = 8192
temperature = 0.0

